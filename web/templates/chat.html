<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JaWiki – Chat RAG</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-hover: #79b8ff;
      --user-msg: #238636;
      --bot-msg: var(--surface);
    }
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      flex-shrink: 0;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: var(--bg);
    }
    header .btn-new-chat {
      padding: 0.4rem 0.8rem;
      font-size: 0.875rem;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    header .btn-new-chat:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    #chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-msg);
      color: #fff;
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot-msg);
      border: 1px solid var(--border);
    }
    .msg .sources {
      margin-top: 0.75rem;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .msg .sources summary { cursor: pointer; }
    .msg .sources ul { margin: 0.25rem 0 0 1rem; padding: 0; }
    .rating-wrap {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .rating-wrap .stars {
      display: inline-flex;
      gap: 2px;
      cursor: pointer;
      user-select: none;
    }
    .rating-wrap .stars span { font-size: 1.2rem; }
    .rating-wrap .stars span.filled { color: #f0c14b; }
    .rating-wrap .stars span:hover { color: #f0c14b; }
    .typing::after {
      content: "...";
      animation: dots 1s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: "."; }
      40% { content: ".."; }
      60%, 100% { content: "..."; }
    }
    #form {
      flex-shrink: 0;
      padding: 1rem;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }
    #form form {
      display: flex;
      gap: 0.5rem;
      max-width: 900px;
      margin: 0 auto;
    }
    #input {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }
    #input:focus {
      outline: none;
      border-color: var(--accent);
    }
    #input::placeholder { color: var(--text-muted); }
    button[type="submit"] {
      padding: 0.6rem 1.2rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    button[type="submit"]:hover { background: var(--accent-hover); }
    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .error { color: #f85149; }
  </style>
</head>
<body>
  <header>
    <span>JaWiki – Base de conhecimento</span>
    <button type="button" class="btn-new-chat" id="btn-new-chat" title="Encerrar esta conversa e iniciar uma nova">Nova conversa</button>
  </header>
  <main id="chat"></main>
  <section id="form">
    <form id="chat-form">
      <textarea id="input" name="message" placeholder="Digite sua pergunta..." rows="1"></textarea>
      <button type="submit" id="submit">Enviar</button>
    </form>
  </section>
  <script>
    const chat = document.getElementById("chat");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("input");
    const submit = document.getElementById("submit");

    // Histórico da conversa (para enviar ao backend e o modelo manter contexto)
    let conversationHistory = [];

    function startNewConversation() {
      chat.replaceChildren();
      conversationHistory = [];
    }

    document.getElementById("btn-new-chat").addEventListener("click", startNewConversation);

    function addMsg(content, isUser, sources = null, responseId = null) {
      const div = document.createElement("div");
      div.className = "msg " + (isUser ? "user" : "bot");
      let html = escapeHtml(content);
      if (sources && sources.length) {
        html += '<div class="sources"><details><summary>Fontes (' + sources.length + ')</summary><ul>';
        sources.forEach((s, i) => {
          html += '<li>#' + (i + 1) + ' (id ' + s.id + '): ' + escapeHtml((s.conteudo || "").slice(0, 120)) + '…</li>';
        });
        html += '</ul></details></div>';
      }
      if (!isUser && responseId != null) {
        html += '<div class="rating-wrap" data-response-id="' + responseId + '">';
        html += 'Avalie esta resposta: <span class="stars" aria-label="1 a 5 estrelas">';
        for (let i = 1; i <= 5; i++) html += '<span data-stars="' + i + '" title="' + i + ' estrela(s)">★</span>';
        html += '</span></div>';
      }
      div.innerHTML = html;
      chat.appendChild(div);
      if (!isUser && responseId != null) {
        const wrap = div.querySelector(".rating-wrap");
        const stars = div.querySelectorAll(".stars span");
        stars.forEach((s, i) => {
          s.addEventListener("click", function() {
            if (wrap.dataset.rated) return;
            const num = i + 1;
            fetch("/api/rate", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ response_id: responseId, stars: num }),
            }).then(r => r.json()).then(data => {
              if (data.ok) {
                wrap.dataset.rated = "1";
                stars.forEach((st, j) => { st.classList.toggle("filled", j < num); });
                wrap.innerHTML = 'Obrigado pela avaliação!';
              }
            });
          });
        });
      }
      scrollChatToEnd();
    }

    function scrollChatToEnd() {
      requestAnimationFrame(function() {
        chat.scrollTop = chat.scrollHeight;
      });
    }

    function addMsgStreaming(text, sources, responseId, onDone) {
      const div = document.createElement("div");
      div.className = "msg bot";
      const contentDiv = document.createElement("div");
      contentDiv.className = "msg-content";
      div.appendChild(contentDiv);
      chat.appendChild(div);
      scrollChatToEnd();
      const words = text.split(/(\s+)/);
      let i = 0;
      const delay = 12;
      function tick() {
        if (i < words.length) {
          contentDiv.textContent += words[i];
          i++;
          scrollChatToEnd();
          setTimeout(tick, delay);
        } else {
          if (sources && sources.length) {
            const wrap = document.createElement("div");
            wrap.className = "sources";
            wrap.innerHTML = "<details><summary>Fontes (" + sources.length + ")</summary><ul></ul></details>";
            const ul = wrap.querySelector("ul");
            sources.forEach(function(s, idx) {
              const li = document.createElement("li");
              li.textContent = "#" + (idx + 1) + " (id " + (s.id || "") + "): " + (s.conteudo || "").slice(0, 120) + "…";
              ul.appendChild(li);
            });
            div.appendChild(wrap);
          }
          if (responseId != null) {
            const ratingWrap = document.createElement("div");
            ratingWrap.className = "rating-wrap";
            ratingWrap.dataset.responseId = responseId;
            ratingWrap.innerHTML = 'Avalie esta resposta: <span class="stars">' +
              [1,2,3,4,5].map(function(n) { return '<span data-stars="' + n + '" title="' + n + ' estrela(s)">★</span>'; }).join('') + '</span>';
            div.appendChild(ratingWrap);
            ratingWrap.querySelectorAll(".stars span").forEach(function(star, idx) {
              star.addEventListener("click", function() {
                if (ratingWrap.dataset.rated) return;
                const num = idx + 1;
                fetch("/api/rate", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ response_id: responseId, stars: num }),
                }).then(function(r) { return r.json(); }).then(function(data) {
                  if (data.ok) {
                    ratingWrap.dataset.rated = "1";
                    ratingWrap.querySelectorAll(".stars span").forEach(function(st, j) { st.classList.toggle("filled", j < num); });
                    ratingWrap.innerHTML = "Obrigado pela avaliação!";
                  }
                });
              });
            });
          }
          scrollChatToEnd();
          if (onDone) onDone();
        }
      }
      tick();
    }

    function escapeHtml(s) {
      const el = document.createElement("div");
      el.textContent = s;
      return el.innerHTML;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = (input.value || "").trim();
      if (!message) return;

      addMsg(message, true);
      input.value = "";
      submit.disabled = true;

      const typing = document.createElement("div");
      typing.className = "msg bot typing";
      typing.textContent = "Buscando";
      chat.appendChild(typing);
      scrollChatToEnd();

      try {
        const res = await fetch("/api/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: message,
            history: conversationHistory,
          }),
        });
        const contentType = res.headers.get("Content-Type") || "";
        if (contentType.indexOf("application/json") !== -1) {
          const data = await res.json();
          typing.remove();
          if (data.ok) {
            const answerText = data.from_cache
              ? "(Resposta reutilizada de pergunta similar)\n\n" + data.answer
              : data.answer;
            if (data.from_cache) {
              addMsgStreaming(answerText, data.sources || [], data.response_id || null, function() {
                conversationHistory.push({ role: "user", content: message });
                conversationHistory.push({ role: "bot", content: data.answer });
                if (conversationHistory.length > 10) conversationHistory.splice(0, conversationHistory.length - 10);
              });
            } else {
              addMsg(answerText, false, data.sources || [], data.response_id || null);
              conversationHistory.push({ role: "user", content: message });
              conversationHistory.push({ role: "bot", content: data.answer });
              if (conversationHistory.length > 10) conversationHistory.splice(0, conversationHistory.length - 10);
              scrollChatToEnd();
            }
          } else {
            addMsg("Erro: " + (data.error || res.status), false);
            scrollChatToEnd();
          }
        } else {
          typing.remove();
          const msgDiv = document.createElement("div");
          msgDiv.className = "msg bot";
          const contentDiv = document.createElement("div");
          contentDiv.className = "msg-content";
          const sourcesWrap = document.createElement("div");
          sourcesWrap.className = "sources";
          sourcesWrap.style.display = "none";
          msgDiv.appendChild(contentDiv);
          msgDiv.appendChild(sourcesWrap);
          chat.appendChild(msgDiv);
          scrollChatToEnd();
          let fullAnswer = "";
          let responseId = null;
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const parts = buffer.split("\n\n");
            buffer = parts.pop() || "";
            for (const part of parts) {
              let event = "";
              let data = "";
              part.split("\n").forEach(function(line) {
                if (line.startsWith("event: ")) event = line.slice(7).trim();
                else if (line.startsWith("data: ")) data = line.slice(6);
              });
              try {
                const parsed = data ? JSON.parse(data) : null;
                if (event === "sources" && parsed) {
                  sourcesWrap.style.display = "block";
                  sourcesWrap.innerHTML = "<details><summary>Fontes (" + parsed.length + ")</summary><ul></ul></details>";
                  const ul = sourcesWrap.querySelector("ul");
                  parsed.forEach(function(s, i) {
                    const li = document.createElement("li");
                    li.textContent = "#" + (i + 1) + " (id " + (s.id || "") + "): " + (s.conteudo || "").slice(0, 120) + "…";
                    ul.appendChild(li);
                  });
                } else if (event === "token" && parsed) {
                  fullAnswer += parsed;
                  contentDiv.textContent = fullAnswer;
                  scrollChatToEnd();
                } else if (event === "done" && parsed) {
                  responseId = parsed.response_id || null;
                } else if (event === "error" && parsed) {
                  contentDiv.textContent = fullAnswer + "\n\n(Erro: " + (parsed.error || "") + ")";
                }
              } catch (_) {}
            }
          }
          if (responseId != null) {
            const ratingWrap = document.createElement("div");
            ratingWrap.className = "rating-wrap";
            ratingWrap.dataset.responseId = responseId;
            ratingWrap.innerHTML = 'Avalie esta resposta: <span class="stars">' +
              [1,2,3,4,5].map(i => '<span data-stars="' + i + '" title="' + i + ' estrela(s)">★</span>').join('') + '</span>';
            msgDiv.appendChild(ratingWrap);
            ratingWrap.querySelectorAll(".stars span").forEach(function(star, i) {
              star.addEventListener("click", function() {
                if (ratingWrap.dataset.rated) return;
                const num = i + 1;
                fetch("/api/rate", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ response_id: responseId, stars: num }),
                }).then(r => r.json()).then(function(data) {
                  if (data.ok) {
                    ratingWrap.dataset.rated = "1";
                    ratingWrap.querySelectorAll(".stars span").forEach(function(st, j) { st.classList.toggle("filled", j < num); });
                    ratingWrap.innerHTML = "Obrigado pela avaliação!";
                  }
                });
              });
            });
          }
          conversationHistory.push({ role: "user", content: message });
          conversationHistory.push({ role: "bot", content: fullAnswer });
          if (conversationHistory.length > 10) conversationHistory.splice(0, conversationHistory.length - 10);
          scrollChatToEnd();
        }
      } catch (err) {
        typing.remove();
        addMsg("Erro de rede: " + err.message, false);
        scrollChatToEnd();
      }
      submit.disabled = false;
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });
  </script>
</body>
</html>
